version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: agentflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Python AI Engine (FastAPI)
  ai-engine:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent Workers
  planner-agent:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    command: python planner_agent.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    deploy:
      replicas: 2
    restart: unless-stopped

  researcher-agent:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    command: python researcher_agent.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    deploy:
      replicas: 2
    restart: unless-stopped

  developer-agent:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    command: python developer_agent.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    deploy:
      replicas: 2
    restart: unless-stopped

  tester-agent:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    command: python tester_agent.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    deploy:
      replicas: 2
    restart: unless-stopped

  reporter-agent:
    build:
      context: ./Ai-Engine
      dockerfile: Dockerfile
    command: python reporter_agent.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agentflow
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Ai-Engine:/app
      - ./generated_projects:/app/generated_projects
    deploy:
      replicas: 1
    restart: unless-stopped

  # Node.js Express Gateway
  api-gateway:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - AI_ENGINE_URL=http://ai-engine:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5001:5000"
    depends_on:
      ai-engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app

  # Next.js Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5001
    ports:
      - "3001:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: